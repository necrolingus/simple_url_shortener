name: build_docker_image

on:
  workflow_dispatch:
  
jobs:
  login_build_push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Checkout Before Build
        uses: actions/checkout@v3
      -    
        name: Build Image
        # The .dockerignore file is automatically picked up by the build context (.)
        run: |
              docker build . --tag ghcr.io/${{github.actor}}/${{ github.event.repository.name }}:latest
              docker push ghcr.io/${{github.actor}}/${{ github.event.repository.name }}:latest
